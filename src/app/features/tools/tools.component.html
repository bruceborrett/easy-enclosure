<div class="grid grid-cols-3 gap-2">
  <button
    class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-300 bg-white/85 text-[10px] font-bold uppercase tracking-[0.12em] text-slate-700 transition hover:border-slate-500 hover:bg-slate-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/30"
    type="button"
    title="Load settings from file"
    (click)="openFilePicker()"
  >
    Load
  </button>
  <button
    class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-300 bg-white/85 text-[10px] font-bold uppercase tracking-[0.12em] text-slate-700 transition hover:border-slate-500 hover:bg-slate-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/30"
    type="button"
    title="Save settings to file"
    (click)="saveParamsFile()"
  >
    Save
  </button>
  <button
    class="inline-flex h-10 w-full items-center justify-center rounded-xl border border-slate-300 bg-slate-900 text-[10px] font-bold uppercase tracking-[0.12em] text-white transition hover:bg-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/30"
    type="button"
    title="Export to STL"
    (click)="openExportModal()"
  >
    STL
  </button>

  <input #fileInput type="file" accept=".json" class="hidden" (change)="loadParamsFile($event)" />
</div>

<div
  class="fixed inset-0 z-30 grid place-items-center bg-slate-900/30 p-3 backdrop-blur-sm"
  [class.hidden]="!isExportModalOpen()"
>
  <div
    class="relative w-[min(30rem,calc(100vw-1.5rem))] rounded-2xl border border-slate-300/70 bg-white/95 px-5 pb-5 pt-10 text-center shadow-[0_20px_48px_rgba(21,43,72,0.22)]"
  >
    <button
      class="absolute right-2 top-2 inline-flex h-8 w-8 items-center justify-center rounded-full border border-transparent bg-transparent text-xl text-slate-500 transition hover:border-slate-300 hover:bg-slate-100 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/30"
      type="button"
      (click)="closeExportModal()"
      aria-label="Close export modal"
    >
      &times;
    </button>
    <p class="mx-auto mb-5 max-w-[22rem] text-sm leading-relaxed text-slate-600">
      Multiple STL files will be exported, one for each entity (lid, base, waterproof seal etc).
    </p>
    <button
      class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-800 bg-slate-900 px-6 text-sm font-semibold text-white transition hover:bg-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/30"
      type="button"
      (click)="exportStl()"
    >
      Export
    </button>
  </div>
</div>
