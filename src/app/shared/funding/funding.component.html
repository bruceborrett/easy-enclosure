<div class="grid grid-cols-1 gap-2">
  <a
    class="flex min-h-12 w-full items-center justify-center border border-slate-200 bg-white px-2 py-1"
    href="https://github.com/sponsors/bruceborrett"
    target="_blank"
    rel="noreferrer"
  >
    <img
      class="h-7 w-auto rounded-md"
      src="https://img.shields.io/static/v1?label=Sponsor&message=%E2%9D%A4&logo=GitHub&color=%232f5d85"
      alt="Sponsor on GitHub"
      loading="lazy"
    />
  </a>

  <div
    class="flex min-h-12 w-full items-center justify-center border border-slate-200 bg-white px-2 py-1"
  >
    <iframe
      title="Buy Me a Coffee"
      class="block h-8.5 w-full max-w-44 overflow-hidden border-0 bg-transparent"
      [attr.srcdoc]="buyMeACoffeeSrcdoc"
      loading="lazy"
      sandbox="allow-scripts allow-popups allow-popups-to-escape-sandbox"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </div>

  <div
    class="flex min-h-12 w-full items-center justify-center border border-slate-200 bg-white px-2 py-1"
  >
    <iframe
      title="GitHub stars"
      class="block h-7.5 w-42.5 ml-10 overflow-hidden rounded-md border-0"
      src="https://ghbtns.com/github-btn.html?user=bruceborrett&repo=easy-enclosure&type=star&count=true&size=large"
      width="170"
      height="30"
      loading="lazy"
    ></iframe>
  </div>
</div>
